<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة عيد مبارك</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sand:#f5efe6;--blush:#e8d5c4;--sage:#a8b89a;
  --rose:#c9828e;--brown:#7a5c4f;--cream:#faf7f2;
  --shadow:rgba(122,92,79,0.15)
}
body{
  font-family:'Tajawal',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1rem;
  background-image:
    radial-gradient(circle at 15% 15%,rgba(201,130,142,.07) 0%,transparent 50%),
    radial-gradient(circle at 85% 85%,rgba(168,184,154,.09) 0%,transparent 50%);
}
.page-header{text-align:center;margin-bottom:1.75rem}
.page-header h1{font-family:'Amiri',serif;font-size:clamp(1.5rem,4vw,2.2rem);color:var(--brown);line-height:1.3}
.page-header p{color:#a08070;font-size:.88rem;margin-top:.35rem}
.card-wrapper{
  background:white;border-radius:24px;
  padding:1.5rem;
  box-shadow:0 8px 40px var(--shadow),0 2px 8px rgba(0,0,0,0.04);
  max-width:480px;width:100%;
  display:flex;flex-direction:column;gap:1.1rem;
}
.canvas-container{border-radius:14px;overflow:hidden;box-shadow:0 4px 20px var(--shadow);}
canvas{display:block;width:100%;height:auto;}
.controls{display:flex;flex-direction:column;gap:.8rem;}
.input-label{font-size:.88rem;font-weight:700;color:var(--brown);margin-bottom:.3rem;display:block;}
.name-input{
  width:100%;padding:.8rem 1rem;
  border:2px solid var(--blush);border-radius:12px;
  font-family:'Tajawal',sans-serif;font-size:1.1rem;
  color:#5a3e35;background:var(--cream);
  transition:border-color .2s,box-shadow .2s;
  outline:none;text-align:center;direction:rtl;
}
.name-input:focus{border-color:var(--rose);box-shadow:0 0 0 4px rgba(201,130,142,.12);}
.name-input::placeholder{color:#c4a898;}
.row{display:flex;align-items:center;gap:.65rem;justify-content:center;}
.row label{font-size:.82rem;color:#9a7060;white-space:nowrap;}
input[type=range]{
  flex:1;-webkit-appearance:none;height:4px;
  border-radius:4px;background:var(--blush);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--rose);box-shadow:0 2px 6px rgba(201,130,142,.4);cursor:pointer;
}
.fval{font-size:.82rem;font-weight:700;color:var(--brown);min-width:2.5ch;text-align:center;}
.swatches{display:flex;align-items:center;gap:.55rem;justify-content:center;flex-wrap:wrap;}
.swatches label{font-size:.82rem;color:#9a7060;}
.sw{
  width:26px;height:26px;border-radius:50%;
  border:2.5px solid transparent;cursor:pointer;
  transition:transform .18s,border-color .18s;
  box-shadow:0 1px 4px rgba(0,0,0,.12);
}
.sw:hover{transform:scale(1.15);}
.sw.active{border-color:var(--brown);transform:scale(1.18);}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.btn{
  padding:.8rem 1rem;border-radius:12px;border:none;
  font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:transform .18s,box-shadow .18s;
  display:flex;align-items:center;justify-content:center;gap:.35rem;
}
.btn:active{transform:scale(.97)!important;}
.btn-gen{
  background:linear-gradient(135deg,var(--rose),#b56870);
  color:white;box-shadow:0 4px 14px rgba(201,130,142,.35);
}
.btn-gen:hover{box-shadow:0 6px 20px rgba(201,130,142,.45);transform:translateY(-1px);}
.btn-dl{
  background:linear-gradient(135deg,var(--sage),#7a9e6e);
  color:white;box-shadow:0 4px 14px rgba(168,184,154,.35);
}
.btn-dl:hover:not(:disabled){box-shadow:0 6px 20px rgba(168,184,154,.45);transform:translateY(-1px);}
.btn-dl:disabled{opacity:.38;cursor:not-allowed;}
.status{
  text-align:center;font-size:.82rem;
  color:var(--rose);min-height:1.4em;
  font-weight:500;transition:color .3s;
}
.status.ok{color:#5a9a6a;}
.hint{text-align:center;font-size:.75rem;color:#b8a090;}
@media(max-width:400px){.btn-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header class="page-header">
  <h1>🌙 بطاقة عيد مبارك</h1>
  <p>اكتب اسمك وشارك البطاقة مع أحبائك</p>
</header>

<div class="card-wrapper">
  <div class="canvas-container">
    <canvas id="c"></canvas>
  </div>

  <div class="controls">
    <div>
      <label class="input-label" for="ni">✍️ اكتب الاسم</label>
      <input type="text" id="ni" class="name-input" placeholder="مثال: سليمان" maxlength="40">
    </div>

    <div class="row">
      <label>حجم الخط:</label>
      <input type="range" id="fs" min="30" max="100" value="65">
      <span class="fval" id="fv">65</span>
    </div>

    <div class="swatches">
      <label>لون النص:</label>
      <div class="sw active" data-c="#5a4a3f" style="background:#5a4a3f;" title="بني داكن"></div>
      <div class="sw" data-c="#7a5c4f" style="background:#7a5c4f;" title="بني"></div>
      <div class="sw" data-c="#c9828e" style="background:#c9828e;" title="وردي"></div>
      <div class="sw" data-c="#5a7a6a" style="background:#5a7a6a;" title="أخضر"></div>
      <div class="sw" data-c="#1a1a1a" style="background:#1a1a1a;" title="أسود"></div>
      <div class="sw" data-c="#8b6914" style="background:#8b6914;" title="ذهبي"></div>
      <div class="sw" data-c="#1a4a6a" style="background:#1a4a6a;" title="أزرق"></div>
    </div>

    <div id="status">⏳ جاري تحميل الصورة...</div>

    <div class="btn-row">
      <button class="btn btn-gen" onclick="draw()">🎨 توليد الصورة</button>
      <button class="btn btn-dl" id="dlBtn" onclick="dl()" disabled>⬇️ تحميل الصورة</button>
    </div>
    <p class="hint">المعاينة تتحدث تلقائياً عند الكتابة</p>
  </div>
</div>

<script>
// ---- Config: box position as ratios of 1126x2000 image ----
// Box borders confirmed: x=154-972, y≈1310-1500
// Name center: x≈563 (0.500), y≈1420 (0.710)

  xRatio: 0.137,   // left edge x/W
  yRatio: 0.655,   // top edge y/H
  wRatio: 0.726,   // width/W
  hRatio: 0.095    // height/H
};

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var color = '#5a4a3f';

  canvas.width  = imgEl.naturalWidth;
  canvas.height = imgEl.naturalHeight;

};

function setStatus(msg, ok) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (ok ? ' ok' : '');
}

function draw() {
  if (!imgEl.complete || !imgEl.naturalWidth) {
    setStatus('⏳ الصورة لم تكتمل بعد', false);
    return;
  }
  var name = document.getElementById('ni').value.trim();
  var fs   = parseInt(document.getElementById('fs').value);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(imgEl, 0, 0);

  if (!name) {
    document.getElementById('dlBtn').disabled = true;
    setStatus('اكتب اسمك لظهوره على البطاقة', false);
    return;
  }

  var W = canvas.width, H = canvas.height;
  var bx = BOX.xRatio * W;
  var by = BOX.yRatio * H;
  var bw = BOX.wRatio * W;
  var bh = BOX.hRatio * H;
  var cx = bx + bw / 2;
  var cy = by + bh / 2;

  ctx.save();
  ctx.font = 'bold ' + fs + 'px Tajawal, Arial';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.direction    = 'rtl';
  ctx.fillStyle    = color;

  // Subtle white halo for legibility
  ctx.shadowColor   = 'rgba(255,255,255,0.9)';
  ctx.shadowBlur    = 10;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  wrapText(ctx, name, cx, cy, bw - 40, fs * 1.35);
  ctx.restore();

  document.getElementById('dlBtn').disabled = false;
  setStatus('✅ جاهزة للتحميل', true);
}

function wrapText(ctx, text, x, y, maxW, lh) {
  var words = text.split(' ');
  var lines = [], line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && i > 0) {
      lines.push(line.trim());
      line = words[i] + ' ';
    } else {
      line = test;
    }
  }
  lines.push(line.trim());
  var startY = y - ((lines.length - 1) * lh) / 2;
  for (var j = 0; j < lines.length; j++) {
    ctx.fillText(lines[j], x, startY + j * lh);
  }
}

function dl() {
  var a = document.createElement('a');
  a.download = 'Eid-Mubarak-' + (document.getElementById('ni').value.trim() || 'card') + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// Live preview
document.getElementById('ni').addEventListener('input', draw);
document.getElementById('fs').addEventListener('input', function() {
  document.getElementById('fv').textContent = this.value;
  draw();
});
document.querySelectorAll('.sw').forEach(function(el) {
  el.addEventListener('click', function() {
    document.querySelectorAll('.sw').forEach(function(s) { s.classList.remove('active'); });
    el.classList.add('active');
    color = el.dataset.c;
    draw();
  });
});
</script>
